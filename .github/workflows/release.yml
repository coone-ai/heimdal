name: Release Heimdal CLI (native + PyPI)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  native-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  pypi-publish:
    runs-on: ubuntu-latest
    needs: native-release
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Derive package version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${TAG}' is not a stable SemVer (vX.Y.Z)."
            exit 1
          fi
          echo "PYPI_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Sync pyproject version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["PYPI_VERSION"]
          path = pathlib.Path("python/pyproject.toml")
          text = path.read_text(encoding="utf-8")
          updated, n = re.subn(
              r'(?m)^version\\s*=\\s*".*"$',
              f'version = "{version}"',
              text,
              count=1,
          )
          if n != 1:
              raise SystemExit("Failed to update [project].version in pyproject.toml")
          path.write_text(updated, encoding="utf-8")
          print(f"Set Python package version to {version}")
          PY

      - name: Build Python package
        run: |
          python -m pip install --upgrade pip build
          python -m build python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
